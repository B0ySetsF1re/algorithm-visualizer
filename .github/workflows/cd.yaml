name: CD

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event.pull_request.base.ref == 'main'
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6.0.2

      - name: Conventional Changelog Action
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6.3.0
        with:
          skip-on-empty: 'false'
          git-message: '{version}'
          github-token: ${{ secrets.github_token }}

      - name: Create Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          gh release create ${{ steps.changelog.outputs.tag }} \
            --title "${{ steps.changelog.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.clean_changelog }}"
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [release]
    if: always() && (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy
        run: npx cdk deploy --require-approval never
